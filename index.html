<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Hub</title>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>Creator Hub</h1>
        <p>Your Content Operating System</p>
      </header>

      <main>
        <section class="welcome-card">
          <h2>👋 Welcome Back</h2>
          <p>Let's build something amazing today.</p>
        </section>

        <section class="stats">
          <div class="card">
            <h3>Projects</h3>
            <span>0</span>
          </div>

          <div class="card">
            <h3>Scripts</h3>
            <span>0</span>
          </div>

          <div class="card">
            <h3>Ideas</h3>
            <span>0</span>
          </div>

          <div class="card">
            <h3>Tasks</h3>
            <span>0</span>
          </div>
        </section>
      </main>

      <nav class="bottom-nav">
        <button>🏠</button>
        <button>📂</button>
        <button>📝</button>
        <button>💡</button>
        <button>⚙️</button>
      </nav>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
